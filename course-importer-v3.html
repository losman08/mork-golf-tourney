function log(m){const e=document.getElementById('log');e.style.display='block';e.textContent+=m+'\n';e.scrollTop=e.scrollHeight;}
function setStatus(m){document.getElementById('status').textContent=m;}
function setBar(n,t){document.getElementById('bar').style.width=(n/t*100)+'%';}

window.runImport = async function(){
  if(!confirm('Import '+COURSES.length+' courses? Takes ~2 minutes.')) return;
  document.getElementById('import-btn').disabled=true;
  let count=0;
  for(const c of COURSES){
    try{
      await addDoc(collection(db,'courseLibrary'),{...c,createdAt:serverTimestamp()});
      count++;
      setBar(count,COURSES.length);
      if(count%10===0){setStatus('Imported '+count+' of '+COURSES.length+'...');log('✅ '+count+' imported');}
    }catch(e){log('❌ Error on '+c.name+': '+e.message);}
  }
  setStatus('✅ Done! '+count+' courses imported.');
  log('\nComplete: '+count+' courses');
  document.getElementById('import-btn').disabled=false;
};

window.checkLibrary = async function(){
  setStatus('Checking...');
  const snap=await getDocs(collection(db,'courseLibrary'));
  const states={};
  snap.docs.forEach(d=>{const s=d.data().state||'?';states[s]=(states[s]||0)+1;});
  log('\nLibrary: '+snap.docs.length+' courses');
  Object.entries(states).sort().forEach(([s,n])=>log('  '+s+': '+n));
  setStatus(snap.docs.length+' courses in library');
};

window.clearLibrary = async function(){
  if(!confirm('Delete ALL courses?')) return;
  const snap=await getDocs(collection(db,'courseLibrary'));
  setStatus('Clearing '+snap.docs.length+' courses...');
  for(const d of snap.docs) await deleteDoc(doc(db,'courseLibrary',d.id));
  setStatus('Library cleared');
  log('Library cleared');
};

onAuthStateChanged(auth,user=>{
  if(!user){setStatus('⚠️ Not signed in — sign into the app first');}
  else{setStatus('Signed in as '+user.email+' — ready to import '+COURSES.length+' courses');}
});
</script>
